<!-- Contact Section -->
<section class="section" aria-labelledby="contact-form-title">
  <div class="container">
    <div class="contact-grid">

      <!-- Form -->
      <div class="contact-form-wrap">
        <h2 id="contact-form-title" class="section-title" data-i18n="contactPage.formTitle"></h2>
        <div id="form-success" class="form-success" role="status" aria-live="polite" data-i18n="contactPage.successMsg"></div>
        <form id="contact-form" class="contact-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="f-name" data-i18n="contactPage.labelName"></label>
            <input id="f-name" class="form-input" type="text" name="name" autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-email" data-i18n="contactPage.labelEmail"></label>
            <input id="f-email" class="form-input" type="email" name="email" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-message" data-i18n="contactPage.labelMessage"></label>
            <textarea id="f-message" class="form-textarea" name="message" required rows="6"></textarea>
          </div>
          <p class="form-hint" data-i18n="contactPage.formNote"></p>
          <button type="submit" class="btn btn--primary btn--lg contact-submit-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M15.75 2.25L8.25 9.75M15.75 2.25L10.5 15.75l-2.25-6-6-2.25 13.5-5.25z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span data-i18n="contactPage.btnSend"></span>
          </button>
        </form>
      </div>

      <!-- Sidebar -->
      <div class="contact-sidebar">
        <!-- Info card -->
        <div class="contact-info-card">
          <h3 data-i18n="contactPage.infoTitle"></h3>
          <p data-i18n="contactPage.infoDesc"></p>
          <p data-i18n="contactPage.infoDesc2"></p>
        </div>

            <div class="contact-detail-icon" aria-hidden="true">

            </div>
          </div>

            </div>
            <div>
              <div class="contact-detail-label">Location</div>
              <span class="contact-detail-value" data-config-address>Metro Manila, Philippines</span>
            </div>

        </div>
