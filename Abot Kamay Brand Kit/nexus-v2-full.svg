<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="warm" x1="0%" y1="20%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F5923A"/>
      <stop offset="40%" stop-color="#E8772E"/>
      <stop offset="100%" stop-color="#C05E1C"/>
    </linearGradient>
    <linearGradient id="cool" x1="100%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#5B9BF5"/>
      <stop offset="40%" stop-color="#2D6FE8"/>
      <stop offset="100%" stop-color="#1B4FBF"/>
    </linearGradient>
    <linearGradient id="ix" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8772E" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2D6FE8" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="beacon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#E0E7FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B4C6EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cr"><circle cx="40" cy="0" r="72"/></clipPath>
    <clipPath id="cr2"><circle cx="14" cy="0" r="26"/></clipPath>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Accent line gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8772E"/>
      <stop offset="100%" stop-color="#2D6FE8"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1400" height="900" fill="#06060A"/>

  <!-- Subtle background texture -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.5" fill="#1A1A2A" opacity="0.5"/>
  </pattern>
  <rect width="1400" height="900" fill="url(#dots)"/>

  <!-- Brand header -->
  <text x="700" y="52" font-family="'Plus Jakarta Sans','Inter','Helvetica Neue',sans-serif" font-size="11" font-weight="600" fill="#3B3B4F" letter-spacing="8" text-anchor="middle">ABOT KAMAY INC.</text>
  <text x="700" y="72" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="10" fill="#2A2A3D" letter-spacing="4" text-anchor="middle">BRAND IDENTITY SYSTEM — NEXUS</text>

  <!-- ===== MAIN LOGO ===== -->
  <g id="Main-Logo" transform="translate(700, 240)">
    <!-- Icon -->
    <g id="Nexus-Icon" transform="translate(-200, 0)">
      <circle cx="0" cy="0" r="85" fill="url(#aura)" filter="url(#softglow)" opacity="0.4"/>
      <circle id="Circle-Warm" cx="-20" cy="0" r="72" fill="none" stroke="url(#warm)" stroke-width="6.5"/>
      <circle id="Circle-Cool" cx="20" cy="0" r="72" fill="none" stroke="url(#cool)" stroke-width="6.5"/>
      <circle cx="-20" cy="0" r="70" fill="url(#ix)" clip-path="url(#cr)"/>
      <circle cx="0" cy="0" r="22" fill="url(#beacon)" filter="url(#glow)" opacity="0.5"/>
      <circle id="Beacon-Outer" cx="0" cy="0" r="12" fill="url(#beacon)"/>
      <circle id="Beacon-Core" cx="0" cy="0" r="6" fill="#FFFFFF"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#FFF" stroke-width="1.2" opacity="0.2"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="#FFF" stroke-width="0.8" opacity="0.1"/>
      <circle cx="0" cy="0" r="42" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.05"/>
    </g>

    <!-- Text -->
    <g id="Company-Name" transform="translate(50, 0)">
      <text x="0" y="-18" font-family="'Plus Jakarta Sans','Inter','Helvetica Neue',sans-serif" font-size="78" font-weight="900" fill="#FAFAFA" letter-spacing="3">ABOT</text>
      <text x="0" y="62" font-family="'Plus Jakarta Sans','Inter','Helvetica Neue',sans-serif" font-size="78" font-weight="900" fill="#FAFAFA" letter-spacing="3">KAMAY</text>
      <text x="2" y="92" font-family="'Plus Jakarta Sans','Inter','Helvetica Neue',sans-serif" font-size="15" font-weight="600" fill="#E8772E" letter-spacing="12">WITHIN REACH</text>
    </g>
  </g>

  <!-- Accent line -->
  <rect x="660" y="390" width="80" height="1.5" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Section: Color Variations -->
  <text x="700" y="440" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#3B3B4F" letter-spacing="5" text-anchor="middle">COLOR VARIATIONS</text>

  <!-- Dark variant -->
  <g id="Var-Dark" transform="translate(240, 540)">
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="#0A0A0F"/>
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="none" stroke="#16162A" stroke-width="1"/>
    <g transform="translate(-52, -5)">
      <circle cx="-14" cy="0" r="26" fill="none" stroke="url(#warm)" stroke-width="3.5"/>
      <circle cx="14" cy="0" r="26" fill="none" stroke="url(#cool)" stroke-width="3.5"/>
      <circle cx="0" cy="0" r="4" fill="#FFF"/>
      <circle cx="0" cy="0" r="2" fill="#FFF"/>
    </g>
    <text x="30" y="-12" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="26" font-weight="900" fill="#FAFAFA" letter-spacing="2">ABOT</text>
    <text x="30" y="18" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="26" font-weight="900" fill="#FAFAFA" letter-spacing="2">KAMAY</text>
    <text x="32" y="38" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="7" font-weight="600" fill="#E8772E" letter-spacing="5">WITHIN REACH</text>
    <text x="0" y="100" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="10" fill="#2A2A3D" letter-spacing="3" text-anchor="middle" font-weight="500">DARK</text>
  </g>

  <!-- Light variant -->
  <g id="Var-Light" transform="translate(700, 540)">
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="#F8F9FC"/>
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="none" stroke="#E0E3EB" stroke-width="1"/>
    <g transform="translate(-52, -5)">
      <circle cx="-14" cy="0" r="26" fill="none" stroke="#C05E1C" stroke-width="3.5"/>
      <circle cx="14" cy="0" r="26" fill="none" stroke="#1B4FBF" stroke-width="3.5"/>
      <circle cx="0" cy="0" r="4" fill="#111117"/>
      <circle cx="0" cy="0" r="2" fill="#111117"/>
    </g>
    <text x="30" y="-12" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="26" font-weight="900" fill="#111117" letter-spacing="2">ABOT</text>
    <text x="30" y="18" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="26" font-weight="900" fill="#111117" letter-spacing="2">KAMAY</text>
    <text x="32" y="38" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="7" font-weight="600" fill="#C05E1C" letter-spacing="5">WITHIN REACH</text>
    <text x="0" y="100" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="10" fill="#2A2A3D" letter-spacing="3" text-anchor="middle" font-weight="500">LIGHT</text>
  </g>

  <!-- Navy variant -->
  <g id="Var-Navy" transform="translate(1160, 540)">
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="#0C1628"/>
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="none" stroke="#1A2742" stroke-width="1"/>
    <g transform="translate(-52, -5)">
      <circle cx="-14" cy="0" r="26" fill="none" stroke="#F5923A" stroke-width="3.5"/>
      <circle cx="14" cy="0" r="26" fill="none" stroke="#5B9BF5" stroke-width="3.5"/>
      <circle cx="0" cy="0" r="4" fill="#FFF"/>
      <circle cx="0" cy="0" r="2" fill="#FFF"/>
    </g>
    <text x="30" y="-12" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="26" font-weight="900" fill="#E8EDF8" letter-spacing="2">ABOT</text>
    <text x="30" y="18" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="26" font-weight="900" fill="#E8EDF8" letter-spacing="2">KAMAY</text>
    <text x="32" y="38" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="7" font-weight="600" fill="#E8772E" letter-spacing="5">WITHIN REACH</text>
    <text x="0" y="100" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="10" fill="#2A2A3D" letter-spacing="3" text-anchor="middle" font-weight="500">NAVY</text>
  </g>

  <!-- ===== COLOR PALETTE ===== -->
  <text x="700" y="710" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#3B3B4F" letter-spacing="5" text-anchor="middle">COLOR PALETTE</text>

  <g transform="translate(310, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#E8772E"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#E8772E</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Sunset</text>
  </g>
  <g transform="translate(400, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#C05E1C"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#C05E1C</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Amber</text>
  </g>
  <g transform="translate(490, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#F5923A"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#F5923A</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Gold</text>
  </g>
  <g transform="translate(580, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#2D6FE8"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#2D6FE8</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Ocean</text>
  </g>
  <g transform="translate(670, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#1B4FBF"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#1B4FBF</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Deep Sea</text>
  </g>
  <g transform="translate(760, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#5B9BF5"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#5B9BF5</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Sky</text>
  </g>
  <g transform="translate(850, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#FAFAFA"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#FAFAFA</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">White</text>
  </g>
  <g transform="translate(940, 760)">
    <rect x="0" y="-18" width="56" height="38" rx="8" fill="#06060A" stroke="#1E1E30" stroke-width="0.5"/>
    <text x="28" y="34" font-family="'SF Mono',monospace" font-size="9" fill="#4A4A5F" text-anchor="middle" font-weight="500">#06060A</text>
    <text x="28" y="46" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="#2A2A3D" text-anchor="middle">Black</text>
  </g>

  <!-- App Icon -->
  <g transform="translate(1100, 760)">
    <rect x="-40" y="-40" width="80" height="80" rx="18" fill="#0A0A0F" stroke="#16162A" stroke-width="0.5"/>
    <circle cx="-10" cy="0" r="22" fill="none" stroke="url(#warm)" stroke-width="3.5"/>
    <circle cx="10" cy="0" r="22" fill="none" stroke="url(#cool)" stroke-width="3.5"/>
    <circle cx="0" cy="0" r="4.5" fill="url(#beacon)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFF"/>
    <text x="0" y="58" font-family="'Plus Jakarta Sans',sans-serif" font-size="9" fill="#2A2A3D" text-anchor="middle" font-weight="500">APP ICON</text>
  </g>

  <!-- Footer -->
  <text x="700" y="870" font-family="'Plus Jakarta Sans','Inter',sans-serif" font-size="9" fill="#1E1E30" letter-spacing="4" text-anchor="middle" font-weight="500">© 2026 ABOT KAMAY INC. — CONFIDENTIAL</text>
</svg>